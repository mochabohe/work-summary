name: Build & Release

# 触发方式:
#   1. push 一个 v* 开头的 tag(例如 v1.0.1)→ 自动打包 + 发布 Release
#   2. 仓库 Actions 页面手动点 "Run workflow" → 只打包,不发 Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean stale build artifacts (tsbuildinfo / dist)
        shell: bash
        run: |
          find . -name 'tsconfig.tsbuildinfo' -not -path '*/node_modules/*' -delete || true
          rm -rf packages/shared/dist packages/server/dist packages/client/dist packages/electron/dist

      - name: Debug - check shared package state BEFORE build
        shell: bash
        run: |
          echo "=== shared package.json exports field ==="
          cat packages/shared/package.json
          echo ""
          echo "=== shared/dist/ (should be empty or not exist) ==="
          ls -la packages/shared/dist/ 2>&1 || echo "(dist does not exist, expected)"
          echo ""
          echo "=== node_modules/@work-summary/shared symlink ==="
          ls -la packages/server/node_modules/@work-summary/ 2>&1 || echo "(no server/node_modules/@work-summary)"
          ls -la node_modules/@work-summary/ 2>&1 || echo "(no root/node_modules/@work-summary)"

      - name: Build shared / server / client
        shell: bash
        run: |
          pnpm --filter @work-summary/shared build
          echo "=== shared/dist/ AFTER shared build ==="
          ls -la packages/shared/dist/
          pnpm --filter @work-summary/server build
          pnpm --filter @work-summary/client build

      - name: Bundle server into server.cjs
        shell: bash
        run: |
          # 1. 把 shared 复制到 server 的 node_modules(解决 workspace 依赖)
          SHARED_LINK="packages/server/node_modules/@work-summary/shared"
          rm -rf "$SHARED_LINK"
          mkdir -p "$SHARED_LINK/dist" "$SHARED_LINK/src"
          cp packages/shared/package.json "$SHARED_LINK/package.json"
          cp -r packages/shared/src/* "$SHARED_LINK/src/"
          cp -r packages/shared/dist/* "$SHARED_LINK/dist/"

          # 2. 用 esbuild 把 server 打包成单文件 CJS(消除 node_modules 依赖)
          # 注意:pnpm --filter exec 会切换 CWD 到对应包目录,所以这里用绝对路径
          pnpm --filter @work-summary/electron exec esbuild \
            "$GITHUB_WORKSPACE/packages/server/dist/index.js" \
            --bundle \
            --platform=node \
            --format=cjs \
            --outfile="$GITHUB_WORKSPACE/packages/server/server.cjs" \
            --external:fsevents \
            --banner:js="const __importMetaUrl = require('url').pathToFileURL(__filename).href;" \
            --define:'import.meta.url'='__importMetaUrl'

      - name: Build electron main process
        run: pnpm --filter @work-summary/electron build

      - name: Generate .env from PROD_ENV_FILE secret
        shell: bash
        env:
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          # 通过 env mapping 注入,避免 GitHub 表达式插值遇到 secret 中的引号/反斜杠时炸 shell
          if [ -n "$PROD_ENV_FILE" ]; then
            printf '%s' "$PROD_ENV_FILE" > .env
            echo ".env 已从 PROD_ENV_FILE secret 生成（$(wc -l < .env | tr -d ' ') 行,$(wc -c < .env | tr -d ' ') 字节）"
          elif [ -f .env.example ]; then
            echo "::warning::未配置 PROD_ENV_FILE secret,回退到 .env.example(打包产物将只含占位符)"
            cp .env.example .env
          else
            echo "::warning::未配置 PROD_ENV_FILE secret 且无 .env.example,生成空 .env"
            touch .env
          fi
          # 校验至少存在一组有效的模型 API_KEY,否则 CI 直接 fail
          # 避免 "生成占位符 .env → 打进安装包 → 用户端 fetch failed" 的静默坏包
          if ! grep -qE '^(MODEL_GPT_API_KEY|MODEL_CLAUDE_API_KEY|DEEPSEEK_API_KEY)=[^[:space:]]+' .env; then
            echo "::error::生成的 .env 缺少真实的模型 API_KEY(MODEL_GPT_API_KEY / MODEL_CLAUDE_API_KEY / DEEPSEEK_API_KEY 至少一个)。请在 repo Settings → Secrets → Actions 添加 PROD_ENV_FILE secret,内容为完整可用的 .env 文件。"
            exit 1
          fi
          # 只检测关键模型 API_KEY 是否为占位符,其他业务字段(FEISHU / BAIDU 等)用户可能不用,
          # 允许保持 your_xxx_here 占位符
          if grep -E '^(MODEL_GPT_API_KEY|MODEL_CLAUDE_API_KEY|DEEPSEEK_API_KEY)=' .env \
             | grep -qE '(sk-your-|your-key-here|your-.*-key)'; then
            echo "::error::MODEL_*_API_KEY 或 DEEPSEEK_API_KEY 的值仍是占位符(sk-your- 开头),请用真实 key 覆盖 PROD_ENV_FILE secret。"
            exit 1
          fi

      - name: Package for Windows
        if: runner.os == 'Windows'
        run: pnpm --filter @work-summary/electron run pack:win

      - name: Package for macOS
        if: runner.os == 'macOS'
        run: pnpm --filter @work-summary/electron run pack:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: Flatten artifact directories
        run: |
          mkdir -p dist
          find release -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.blockmap' \) -exec cp {} dist/ \;
          ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
